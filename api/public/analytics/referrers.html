                                        <tr>

                                            <th>Type</th>

                        </div>

    <script src="js/reports.js"></script>
    <script>
        (async function() {
            'use strict';

            // Check authentication
            if (!await Reports.checkAuth()) return;

            // State
            let currentType = '';
            let allData = null;

            // Load data
            async function loadData() {
                Reports.showLoading('referrers-tbody');

                try {
                    const params = {};
                    if (currentType) {
                        params.type = currentType;
                    }

                    const response = await Reports.apiGet('/referrers', params);

                    if (response.success && response.data) {
                        allData = response.data;
                        renderTable(response.data.referrers);
                        renderPieChart(response.data.by_type);
                    } else {
                        Reports.showEmpty('referrers-tbody', 'No referrer data available');
                    }
                } catch (err) {
                    console.error('Failed to load referrers:', err);
                    Reports.showError('referrers-tbody', 'Failed to load referrer data');
                }
            }

            // Render table
            function renderTable(referrers) {
                const tbody = document.getElementById('referrers-tbody');

                if (!referrers || referrers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="table-empty">No referrers found</td></tr>';
                    return;
                }

                tbody.innerHTML = referrers.map(ref => `
                    <tr>
                        <td>${Reports.escapeHtml(ref.domain)}</td>
                        <td>${Reports.getReferrerBadge(ref.type)}</td>
                        <td class="numeric">${Reports.formatNumber(ref.visits)}</td>
                        <td class="numeric">${Reports.formatNumber(ref.page_views)}</td>
                    </tr>
                `).join('');
            }

            // Render pie chart
            function renderPieChart(byType) {
                if (!byType) return;

                const labels = ['Direct', 'Search', 'Social', 'Referral'];
                const data = [
                    byType.direct || 0,
                    byType.search || 0,
                    byType.social || 0,
                    byType.referral || 0
                ];
                const colors = ['#3730A3', '#166534', '#991B1B', '#92400E'];

                Reports.createPieChart('type-pie-chart', data, labels, colors);

                // Render legend
                const legend = document.getElementById('pie-legend');
                const total = data.reduce((a, b) => a + b, 0);

                legend.innerHTML = labels.map((label, i) => {
                    const percent = total > 0 ? Math.round((data[i] / total) * 100) : 0;
                    return `
                        <div class="legend-item">
                            <div class="legend-color" style="background-color: ${colors[i]}"></div>
                            <span>${label}: ${percent}%</span>
                        </div>
                    `;
                }).join('');
            }

            // Initialize sorting
            Reports.initTableSorting('referrers-table', (column, order) => {
                if (allData && allData.referrers) {
                    const sorted = Reports.sortTableData(allData.referrers, column, order);
                    renderTable(sorted);
                }
            });

            // Filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentType = tab.dataset.type;
                    loadData();
                });
            });

            // Listen for date changes
            document.addEventListener('dateRangeChanged', loadData);

            // Initial load
            loadData();
        })();
    </script>
