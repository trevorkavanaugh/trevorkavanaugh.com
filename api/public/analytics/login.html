<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to TPRM Analytics Dashboard">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign In | TPRM Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content" class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <header class="auth-header">
                <a href="/" class="auth-logo" aria-label="Return to homepage">
                    <div class="auth-logo-icon">TK</div>
                    <span class="auth-logo-text">TPRM Analytics</span>
                </a>
                <h1 class="auth-title">Sign In</h1>
                <p class="auth-subtitle">Access your analytics dashboard</p>
            </header>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <!-- Error/Success Message -->
                <div id="login-message" class="message" aria-live="polite"></div>

                <!-- Credentials Section -->
                <div id="credentials-section">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input"
                            autocomplete="username"
                            autocapitalize="none"
                            autocorrect="off"
                            spellcheck="false"
                            required
                            aria-required="true"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            autocomplete="current-password"
                            required
                            aria-required="true"
                        >
                    </div>

                    <button type="submit" id="login-button" class="btn btn--primary">
                        Sign In
                    </button>
                </div>

                <!-- TOTP Verification Section (Hidden by default) -->
                <section id="totp-section" class="totp-section" aria-hidden="true">
                    <div id="totp-message" class="message" aria-live="polite"></div>

                    <div class="form-group">
                        <label for="totp-code" id="totp-label" class="form-label">Verification Code</label>
                        <input
                            type="text"
                            id="totp-code"
                            name="totp-code"
                            class="form-input form-input--code"
                            placeholder="000000"
                            maxlength="6"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            autocomplete="one-time-code"
                            aria-describedby="totp-help"
                        >
                        <p id="totp-help" class="visually-hidden">Enter the 6-digit code from your authenticator app</p>
                    </div>

                    <button type="submit" id="totp-button" class="btn btn--primary">
                        Verify
                    </button>

                    <div class="totp-toggle">
                        <button type="button" id="backup-toggle" class="btn--link">
                            Use backup code instead
                        </button>
                    </div>
                </section>
            </form>

            <!-- Footer -->
            <footer class="auth-footer">
                <a href="/">Return to main site</a>
            </footer>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
