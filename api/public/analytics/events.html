    <!-- Event Details Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-event-name">Event Details</h2>
                <button class="modal-close" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <p>Loading event details...</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn--secondary" data-close-modal>Close</button>
            </div>
        </div>
    </div>

    <script src="js/site-selector.js"></script>
    <script src="js/reports.js"></script>
    <script>
        (async function() {
            'use strict';

            // Check authentication
            if (!await Reports.checkAuth()) return;

            // Key events to highlight
            const keyEvents = ['pdf_download', 'newsletter_signup', 'contact_click', 'linkedin_click', 'paper_download'];

            // Load data
            async function loadData() {
                Reports.showLoading('events-tbody');

                try {
                    const response = await Reports.apiGet('/events');

                    if (response.success && response.data.events) {
                        renderTable(response.data.events);
                    } else {
                        Reports.showEmpty('events-tbody', 'No event data available');
                    }
                } catch (err) {
                    console.error('Failed to load events:', err);
                    Reports.showError('events-tbody', 'Failed to load event data');
                }
            }

            // Render table
            function renderTable(events) {
                const tbody = document.getElementById('events-tbody');

                if (!events || events.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="table-empty">No events found</td></tr>';
                    return;
                }

                tbody.innerHTML = events.map(event => {
                    const isKeyEvent = keyEvents.includes(event.name);
                    const icon = Reports.getEventIcon(event.name);

                    return `
                        <tr class="clickable" data-event="${Reports.escapeHtml(event.name)}">
                            <td>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    ${isKeyEvent ? `<span class="live-event-icon live-event-icon--${event.name}" style="width: 28px; height: 28px;">${icon}</span>` : ''}
                                    <span style="${isKeyEvent ? 'font-weight: 600;' : ''}">${Reports.escapeHtml(event.name)}</span>
                                </div>
                            </td>
                            <td class="numeric">${Reports.formatNumber(event.count)}</td>
                            <td class="numeric">${Reports.formatNumber(event.unique_visitors)}</td>
                        </tr>
                    `;
                }).join('');

                // Add click handlers for row details
                tbody.querySelectorAll('tr.clickable').forEach(row => {
                    row.addEventListener('click', () => {
                        const eventName = row.dataset.event;
                        showEventDetails(eventName, events.find(e => e.name === eventName));
                    });
                });
            }

            // Show event details in modal
            function showEventDetails(eventName, eventData) {
                const modalTitle = document.getElementById('modal-event-name');
                const modalBody = document.getElementById('modal-body');

                modalTitle.textContent = eventName;

                if (eventData) {
                    modalBody.innerHTML = `
                        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px;">
                            <div class="stat-card">
                                <div class="stat-label">Total Count</div>
                                <div class="stat-value">${Reports.formatNumber(eventData.count)}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Unique Visitors</div>
                                <div class="stat-value">${Reports.formatNumber(eventData.unique_visitors)}</div>
                            </div>
                        </div>
                        <div>
                            <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 8px;">Event Type</h3>
                            <p style="color: var(--color-text-secondary); font-size: 14px;">
                                ${getEventDescription(eventName)}
                            </p>
                        </div>
                    `;
                } else {
                    modalBody.innerHTML = '<p>Event details not available.</p>';
                }

                Reports.openModal('event-modal');
            }

            // Get event description
            function getEventDescription(eventName) {
                const descriptions = {
                    'pdf_download': 'User clicked to download a PDF file from the site.',
                    'paper_download': 'User downloaded the research paper.',
                    'newsletter_signup': 'User subscribed to the email newsletter.',
                    'contact_click': 'User clicked a contact link (email or phone).',
                    'linkedin_click': 'User clicked the LinkedIn profile link.',
                    'page_view': 'A page was viewed on the site.',
                    'email_click': 'User clicked an email link.'
                };
                return descriptions[eventName] || 'Custom event tracked on the site.';
            }

            // Initialize sorting
            Reports.initTableSorting('events-table', async (column, order) => {
                // Reload with sort
                const response = await Reports.apiGet('/events');
                if (response.success && response.data.events) {
                    const sorted = Reports.sortTableData(response.data.events, column, order);
                    renderTable(sorted);
                }
            });

            // Listen for date changes
            document.addEventListener('dateRangeChanged', loadData);

            // Expose refreshData for site-selector
            window.refreshData = loadData;

            // Initial load
            loadData();
        })();
    </script>
